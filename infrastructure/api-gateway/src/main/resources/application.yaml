server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/scn/v1/product/**
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/scn/v1/inventory/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/scn/v1/order/**

eureka:
  client:
    registry-fetch-interval-seconds: 5
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka/
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1

